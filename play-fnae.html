<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playing FNAE | Con's Hidden Center</title>
  <style>
    body { 
      background-color: #0a0a0a;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center; 
      height: 100vh;
      color: #ffffff;
      font-family: sans-serif;
    }
    .game-container {
      width: 800px;
      height: 600px;
      border: 2px solid #d4af37;
      border-radius: 8px;
      box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2);
      background: #000;
      overflow: hidden;
    }
    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    .back-home-btn {
      background: transparent;
      color: #a0a0a0;
      border: 1px solid #444;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 25px;
      width: 200px;
    }
    .back-home-btn:hover {
      background: #1a1a1a;
      color: #ffffff;
      border-color: #d4af37;
    }
  </style>
</head>
<body> 

  <div class="game-container">
    <iframe src="FNAE-HTML5-1.2.3-main/index.html"
    class="game-frame" 
    sandbox="allow-scripts allow-same-origin allow-pointer-lock"
    allowfullscreen
    allow="autoplay; fullscreen; keyboard">
    </iframe>
  </div>

  <button onclick="history.back()" class="back-home-btn">Go Back</button>

</body>
</html>
